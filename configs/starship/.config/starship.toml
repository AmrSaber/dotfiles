add_newline = false

format = """
${custom.venv}\
$hostname\
$container\
$fill\
$status\
\
$line_break\
\
$directory\
(\\($git_branch\
$git_status\\))\
${custom.python}$bun$nodejs$golang$rust$deno$zig$lua$ruby$php$java$swift$kotlin$elixir$erlang$gleam$ocaml$scala$haskell\
\
$line_break\
\
$character
"""

right_format = '$cmd_duration'

[fill]
style = 'bright-black'
symbol = '-'

[directory]
style = 'blue'
truncate_to_repo = false
truncation_length = -1

[character]
success_symbol = '[❯](bold blue)'
error_symbol = '[❯](red)'

[hostname]
format = '[\[$hostname\]]($style)'

[container]
format = '[\[$symbol $name\]]($style)'

[git_branch]
format = '[$branch]($style)'
style = 'white'

[git_status]
format = '[(*$all_status)]($style)'

# u200b (sometimes displayed as <200b>) is the zero-width character
# This causes any status update to show '*'.
# The () in the format makes the whole block only shows when at least one of the variables has a value
conflicted = '​'
untracked = '​'
modified = '​'
staged = '​'
renamed = '​'
deleted = '​'
typechanged = '​'
stashed = ''

[cmd_duration]
format = '[\[$duration\]]($style) '
style = 'white'
min_time = 1_000

[status]
format = '[\[$status( $common_meaning)(; SIG$signal_name $signal_number)\]]($style)'
disabled = false

[custom.venv]
command = 'printf "[%s]" "$(basename $VIRTUAL_ENV)"'
when = '[[ -n "$VIRTUAL_ENV" ]]'
format = '[$output]($style)'
style = "white"

[custom.python]
command = '{python --version 2>/dev/null || python3 --version 2>/dev/null || python2 --version 2>/dev/null } |cut -d " " -f 2'
when = '[[ -f pyproject.toml || -f requirements.txt || -f .python-version ]] || ls *.py 2>/dev/null | grep -q .'
format = ' [\[Python( $output)\]]($style)'
style = 'yellow bold'

# Language modules — [Name version] in each language's default color
[bun]
format = ' [\[Bun( $version)\]]($style)'

[nodejs]
format = ' [\[Node( $version)\]]($style)'

[golang]
format = ' [\[Go( $version)\]]($style)'

[rust]
format = ' [\[Rust( $version)\]]($style)'

[deno]
format = ' [\[Deno( $version)\]]($style)'

[zig]
format = ' [\[Zig( $version)\]]($style)'

[lua]
format = ' [\[Lua( $version)\]]($style)'

[ruby]
format = ' [\[Ruby( $version)\]]($style)'

[php]
format = ' [\[PHP( $version)\]]($style)'

[java]
format = ' [\[Java( $version)\]]($style)'

[swift]
format = ' [\[Swift( $version)\]]($style)'

[kotlin]
format = ' [\[Kotlin( $version)\]]($style)'

[elixir]
format = ' [\[Elixir( $version)\]]($style)'

[erlang]
format = ' [\[Erlang( $version)\]]($style)'

[gleam]
format = ' [\[Gleam( $version)\]]($style)'

[ocaml]
format = ' [\[OCaml( $version)\]]($style)'

[scala]
format = ' [\[Scala( $version)\]]($style)'

[haskell]
format = ' [\[Haskell( $version)\]]($style)'
